<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sand Dollar - Ocean Organizer</title>
    <link href="https://fonts.googleapis.com/css2?family=OpenDyslexic&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #047857; --primary-light: #059669; --success: #10b981;
            --warning: #d97706; --danger: #991b1b; --bg-dark: #020d1a;
            --bg-light: #0a1628; --surface: #0d1f2d; --surface-light: #132a3d;
            --border: #1a3a4d; --text-primary: #b0c4d4; --text-secondary: #7a8fa0;
            --text-tertiary: #546073; --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --glass-bg: rgba(13,31,45,0.55); --glass-border: rgba(255,255,255,0.06);
        }
        body { font-family: 'OpenDyslexic', Arial, sans-serif; background: linear-gradient(135deg, #020d1a 0%, #0a1628 50%, #061220 100%); color: var(--text-primary); overflow: hidden; }
        /* Starfield */
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .container { display: grid; grid-template-columns: 280px 1fr; height: 100vh; position: relative; z-index: 1; }
        /* Sidebar */
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 16px; overflow-y: auto; display: flex; flex-direction: column; box-shadow: var(--shadow-sm); z-index: 10; transition: transform 0.3s ease; }
        .logo { font-size: 18px; font-weight: 800; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; color: var(--text-primary); }
        .sand-dollar-icon { width: 40px; height: 40px; animation: sdRotate 20s linear infinite; }
        @keyframes sdRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .nav-section { margin-bottom: 28px; }
        .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.08em; margin-bottom: 12px; padding: 0 8px; }
        .nav-item { padding: 12px; margin-bottom: 6px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary); transition: all 0.2s ease; display: flex; align-items: center; gap: 10px; user-select: none; }
        .nav-item:hover { background: var(--surface-light); color: var(--text-primary); }
        .nav-item.active { background: linear-gradient(135deg, #047857 0%, #059669 100%); color: #f0f9ff; font-weight: 600; box-shadow: 0 4px 12px rgba(4,120,87,0.4); }
        .sync-info { margin-top: auto; padding: 12px; background: var(--surface-light); border-radius: 10px; font-size: 12px; color: var(--text-secondary); text-align: center; border: 1px solid var(--border); }
        /* Hamburger */
        .hamburger { display: none; background: none; border: none; color: var(--text-primary); font-size: 28px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background 0.2s; }
        .hamburger:hover { background: var(--surface-light); }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9; }
        /* Main */
        .main { display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .ocean-waves { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; overflow: hidden; z-index: 0; pointer-events: none; }
        .ocean-wave { position: absolute; bottom: 0; left: -50%; width: 200%; height: 100%; }
        .ocean-wave svg { width: 100%; height: 100%; }
        .ocean-wave:nth-child(1) { animation: owSlide 10s linear infinite; opacity: 0.08; }
        .ocean-wave:nth-child(2) { animation: owSlide 14s linear infinite reverse; opacity: 0.05; bottom: 5px; }
        .ocean-wave:nth-child(3) { animation: owSlide 18s linear infinite; opacity: 0.04; bottom: 12px; }
        @keyframes owSlide { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }
        .header { background: var(--surface); padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; gap: 12px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-title { font-size: 28px; font-weight: 700; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        /* Search */
        .search-box { position: relative; }
        .search-input { padding: 8px 14px 8px 36px; border: 1px solid var(--border); border-radius: 10px; font-family: 'OpenDyslexic', Arial, sans-serif; font-size: 13px; color: var(--text-primary); background: var(--surface-light); width: 200px; transition: all 0.3s ease; }
        .search-input:focus { outline: none; border-color: #047857; width: 280px; box-shadow: 0 0 0 3px rgba(4,120,87,0.15); }
        .search-input::placeholder { color: var(--text-tertiary); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-tertiary); pointer-events: none; }
        .search-results { position: absolute; top: 100%; right: 0; margin-top: 8px; width: 360px; max-height: 400px; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100; display: none; }
        .search-results.active { display: block; }
        .search-result-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
        .search-result-item:hover { background: var(--surface-light); }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-type { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-tertiary); letter-spacing: 0.06em; }
        .search-result-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-top: 2px; }
        .btn { padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; font-family: 'OpenDyslexic', Arial, sans-serif; font-size: 14px; font-weight: 600; transition: all 0.2s ease; display: flex; align-items: center; gap: 6px; }
        .btn-primary { background: linear-gradient(135deg, #047857 0%, #059669 100%); color: #f0f9ff; box-shadow: 0 4px 12px rgba(4,120,87,0.3); font-weight: 700; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(4,120,87,0.4); }
        .btn-secondary { background: var(--surface-light); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .content { flex: 1; overflow-y: auto; padding: 32px; position: relative; z-index: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 14px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.04); border: 1px solid var(--glass-border); transition: all 0.3s ease; }
        .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06); border-color: rgba(4,120,87,0.3); transform: translateY(-3px); }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .card-text { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }
        .card-footer { display: flex; gap: 8px; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-tertiary); flex-wrap: wrap; }
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
        .form-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'OpenDyslexic', Arial, sans-serif; font-size: 14px; color: var(--text-primary); background: var(--surface-light); transition: all 0.2s ease; }
        .form-input:focus { outline: none; border-color: #047857; background: rgba(4,120,87,0.05); box-shadow: 0 0 0 3px rgba(4,120,87,0.15); }
        .form-input::placeholder { color: var(--text-tertiary); }
        textarea.form-input { min-height: 100px; resize: vertical; font-family: 'OpenDyslexic', Arial, sans-serif; }
        .form-section { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 14px; padding: 24px; border: 2px dashed rgba(255,255,255,0.08); margin-top: 20px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
        .checkbox-wrapper { display: flex; gap: 12px; align-items: flex-start; }
        .checkbox { width: 24px; height: 24px; min-width: 24px; border-radius: 6px; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--surface); transition: all 0.2s ease; margin-top: 2px; }
        .checkbox:hover { border-color: #047857; }
        .checkbox.checked { background: linear-gradient(135deg, #047857 0%, #059669 100%); border-color: #047857; color: #f0f9ff; font-weight: bold; }
        .btn-delete { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; border-radius: 4px; transition: all 0.2s ease; font-size: 16px; }
        .btn-delete:hover { background: rgba(153,27,27,0.2); color: #fca5a5; }
        .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; background: rgba(4,120,87,0.2); color: #7cd6c4; }
        .tag-high { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .tag-medium { background: rgba(217,119,6,0.2); color: #fbbf24; }
        .tag-low { background: rgba(4,120,87,0.2); color: #7cd6c4; }
        .completion-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
        .completion-ring svg { transform: rotate(-90deg); }
        .completion-ring .ring-text { position: absolute; font-size: 18px; font-weight: 800; }
        /* Countdown badge */
        .countdown { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .countdown-urgent { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .countdown-soon { background: rgba(217,119,6,0.2); color: #fbbf24; }
        .countdown-ok { background: rgba(4,120,87,0.2); color: #7cd6c4; }
        /* Study goal progress bar */
        .goal-bar-bg { width: 100%; height: 12px; background: var(--border); border-radius: 6px; overflow: hidden; }
        .goal-bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; background: linear-gradient(90deg, #047857, #10b981); }
        /* Flashcard study mode */
        .study-mode-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(2,13,26,0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 5000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .flashcard-study { width: 440px; max-width: 90vw; height: 280px; perspective: 1000px; cursor: pointer; margin-bottom: 28px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s ease; transform-style: preserve-3d; }
        .flashcard-inner.flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 18px; display: flex; align-items: center; justify-content: center; padding: 32px; text-align: center; font-size: 18px; font-weight: 600; line-height: 1.5; }
        .flashcard-front { background: linear-gradient(135deg, rgba(4,120,87,0.25), rgba(5,150,105,0.15)); border: 1px solid rgba(4,120,87,0.3); color: var(--text-primary); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .flashcard-back { background: linear-gradient(135deg, rgba(37,99,235,0.25), rgba(13,148,136,0.15)); border: 1px solid rgba(37,99,235,0.3); color: var(--text-primary); transform: rotateY(180deg); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .study-btn { padding: 14px 28px; border-radius: 14px; border: none; cursor: pointer; font-family: 'OpenDyslexic', Arial, sans-serif; font-size: 15px; font-weight: 700; transition: all 0.2s ease; }
        .study-btn:hover { transform: translateY(-2px); }
        .study-btn.correct { background: linear-gradient(135deg, #047857, #059669); color: #f0f9ff; box-shadow: 0 4px 16px rgba(4,120,87,0.4); }
        .study-btn.wrong { background: linear-gradient(135deg, #991b1b, #b91c1c); color: #fef2f2; box-shadow: 0 4px 16px rgba(153,27,27,0.4); }
        .study-btn.close { background: var(--surface-light); color: var(--text-primary); border: 1px solid var(--border); }
        /* Fish rain */
        .fish-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 8000; pointer-events: none; overflow: hidden; }
        .fish { position: absolute; font-size: 32px; animation: fishFall linear forwards; }
        @keyframes fishFall { 0% { transform: translateY(-60px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0.7; } }
        /* Lock screen */
        .lock-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; background: linear-gradient(135deg, #020d1a 0%, #0a1628 40%, #061a2e 70%, #020d1a 100%); display: flex; align-items: center; justify-content: center; flex-direction: column; overflow: hidden; }
        .lock-screen.unlocked { animation: lockFadeOut 0.6s ease forwards; pointer-events: none; }
        @keyframes lockFadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        .wave-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; overflow: hidden; }
        .wave { position: absolute; bottom: 0; left: -50%; width: 200%; height: 100%; }
        .wave svg { width: 100%; height: 100%; }
        .wave:nth-child(1) { animation: waveSlide 8s linear infinite; opacity: 0.12; }
        .wave:nth-child(2) { animation: waveSlide 11s linear infinite reverse; opacity: 0.08; bottom: 10px; }
        .wave:nth-child(3) { animation: waveSlide 14s linear infinite; opacity: 0.06; bottom: 20px; }
        @keyframes waveSlide { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }
        .bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(4,120,87,0.25), rgba(4,120,87,0.05)); border: 1px solid rgba(4,120,87,0.15); animation: bubbleFloat linear infinite; }
        @keyframes bubbleFloat { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
        .lock-content { position: relative; z-index: 2; text-align: center; padding: 40px; }
        .lock-logo { margin-bottom: 32px; animation: lockLogoIn 0.8s ease-out; }
        @keyframes lockLogoIn { 0% { transform: translateY(-20px) scale(0.9); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        .lock-logo svg { width: 80px; height: 80px; filter: drop-shadow(0 4px 20px rgba(196,167,71,0.3)); }
        .lock-title { font-size: 36px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; animation: lockTextIn 0.8s ease-out 0.1s both; }
        .lock-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 36px; animation: lockTextIn 0.8s ease-out 0.2s both; }
        @keyframes lockTextIn { 0% { transform: translateY(12px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .lock-form { animation: lockTextIn 0.8s ease-out 0.3s both; }
        .lock-input-wrapper { position: relative; width: 280px; margin: 0 auto 16px; }
        .lock-input { width: 100%; padding: 16px 20px; border: 2px solid var(--border); border-radius: 14px; font-family: 'OpenDyslexic', Arial, sans-serif; font-size: 16px; color: var(--text-primary); background: rgba(13,31,45,0.8); backdrop-filter: blur(10px); text-align: center; letter-spacing: 4px; transition: all 0.3s ease; }
        .lock-input:focus { outline: none; border-color: #047857; box-shadow: 0 0 0 4px rgba(4,120,87,0.2), 0 8px 32px rgba(0,0,0,0.3); }
        .lock-input::placeholder { color: var(--text-tertiary); letter-spacing: 1px; }
        .lock-btn { padding: 14px 48px; border-radius: 14px; border: none; cursor: pointer; font-family: 'OpenDyslexic', Arial, sans-serif; font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #047857 0%, #059669 100%); color: #f0f9ff; box-shadow: 0 4px 20px rgba(4,120,87,0.4); transition: all 0.3s ease; }
        .lock-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(4,120,87,0.5); }
        .lock-error { color: #fca5a5; font-size: 13px; margin-top: 12px; height: 20px; }
        .lock-error.shake { animation: lockShake 0.5s ease; }
        @keyframes lockShake { 0%,100%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);} }
        .lock-settings { margin-top: 24px; font-size: 12px; color: var(--text-tertiary); }
        .lock-settings a { color: var(--text-secondary); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
        .lock-settings a:hover { color: var(--text-primary); }
        .app-locked .container { display: none; }
        .app-locked #starfield { display: none; }
        /* Sort controls */
        .sort-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; font-size: 12px; color: var(--text-secondary); }
        .sort-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; font-family: 'OpenDyslexic', Arial, sans-serif; font-size: 11px; font-weight: 600; transition: all 0.2s; }
        .sort-btn.active { background: var(--primary); color: #f0f9ff; border-color: var(--primary); }
        .sort-btn:hover { border-color: var(--primary); }
        /* Pinned note */
        .pin-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px; transition: transform 0.2s; }
        .pin-btn:hover { transform: scale(1.2); }
        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; transform: translateX(-100%); z-index: 10; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .hamburger { display: block; }
            .search-input { width: 140px; }
            .search-input:focus { width: 200px; }
            .search-results { width: 300px; }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script>
    // ===== STARFIELD =====
    function initStarfield() {
        const c = document.getElementById('starfield'), ctx = c.getContext('2d');
        let w, h, stars = [];
        function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        for (let i = 0; i < 80; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.5+0.3, dx: (Math.random()-0.5)*0.15, dy: (Math.random()-0.5)*0.1, o: Math.random()*0.5+0.2 });
        function draw() {
            ctx.clearRect(0,0,w,h);
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(120,180,210,${s.o})`; ctx.fill();
                s.x += s.dx; s.y += s.dy;
                if (s.x < 0) s.x = w; if (s.x > w) s.x = 0;
                if (s.y < 0) s.y = h; if (s.y > h) s.y = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    // ===== FISH RAIN =====
    function fishRain() {
        const container = document.getElementById('fishRain');
        const fish = ['🐟','🐠','🐡','🦈','🐬','🐳','🐋','🦑','🐙','🦐','🦀','🪼','🐚','🦭'];
        for (let i = 0; i < 40; i++) {
            const el = document.createElement('div');
            el.className = 'fish';
            el.textContent = fish[Math.floor(Math.random()*fish.length)];
            el.style.left = Math.random()*100+'%';
            el.style.fontSize = (20+Math.random()*30)+'px';
            el.style.animationDuration = (2+Math.random()*3)+'s';
            el.style.animationDelay = (Math.random()*2)+'s';
            container.appendChild(el);
        }
        setTimeout(() => { container.innerHTML = ''; }, 6000);
    }

    // ===== OCEAN FACTS =====

    function getDailyFact() { const d=new Date(); return oceanFacts[Math.floor((d-new Date(d.getFullYear(),0,0))/86400000)%oceanFacts.length]; }

    // ===== HELPERS =====
    function completionRing(done,total,size,color) {
        const pct=total===0?0:Math.round((done/total)*100), r=(size-8)/2, circ=2*Math.PI*r, off=circ-(pct/100)*circ;
        return `<div class="completion-ring"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="6"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 0.8s ease;"/></svg><span class="ring-text" style="color:${color};">${pct}%</span></div>`;
    }
    function countdownBadge(dueDate) {
        const now=new Date(), due=new Date(dueDate+'T23:59:59'), diff=Math.ceil((due-now)/(1000*60*60*24));
        if (diff<0) return `<span class="countdown countdown-urgent">⚠️ Overdue</span>`;
        if (diff===0) return `<span class="countdown countdown-urgent">🔥 Due today</span>`;
        if (diff===1) return `<span class="countdown countdown-soon">⏰ Tomorrow</span>`;
        if (diff<=3) return `<span class="countdown countdown-soon">⏰ ${diff} days</span>`;
        return `<span class="countdown countdown-ok">📅 ${diff} days</span>`;
    }
    function priorityTag(p) { return `<span class="tag tag-${p}">${p}</span>`; }
    function hexToRgb(hex) { const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'0,0,0'; }
    const CC = { 'Environmental':'#0d9488','Space':'#0369a1','Math':'#2563eb','Health':'#06b6d4','Film':'#0891b2','Anatomy':'#14b8a6' };

    // ===== APP =====
    const app = {
        currentPage:'dashboard', tasks:[], assignments:[], notes:[], studySessions:[], flashcards:[], vocab:[], calendarEvents:[], grades:[], archived:[], books:[], readingLogs:[],
        activeClassTab:'all', activeVocabTab:'all', activeFlashcardTab:'all', assignmentSort:'due',
        weeklyStudyGoal: 120,

        init() { this.loadData(); this.setupSidebar(); this.setupExport(); this.setupSearch(); this.render(); },

        loadData() {
            const s=localStorage.getItem('sandDollarData');
            if(s){const d=JSON.parse(s);this.tasks=d.tasks||[];this.assignments=d.assignments||[];this.notes=d.notes||[];this.studySessions=d.studySessions||[];this.flashcards=d.flashcards||[];this.vocab=d.vocab||[];this.calendarEvents=d.calendarEvents||[];this.grades=d.grades||[];this.archived=d.archived||[];this.weeklyStudyGoal=d.weeklyStudyGoal||120;this.books=d.books||[];this.readingLogs=d.readingLogs||[];}
        },
        saveData() {
            localStorage.setItem('sandDollarData',JSON.stringify({tasks:this.tasks,assignments:this.assignments,notes:this.notes,studySessions:this.studySessions,flashcards:this.flashcards,vocab:this.vocab,calendarEvents:this.calendarEvents,grades:this.grades,archived:this.archived,weeklyStudyGoal:this.weeklyStudyGoal,books:this.books,readingLogs:this.readingLogs}));
        },
        setupSidebar() {
            document.querySelectorAll('[data-page]').forEach(item=>{item.addEventListener('click',()=>{document.querySelectorAll('[data-page]').forEach(i=>i.classList.remove('active'));item.classList.add('active');this.currentPage=item.dataset.page;this.render();document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('active');});});
            document.getElementById('hamburgerBtn').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('active');});
            document.getElementById('sidebarOverlay').addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('active');});
        },
        setupExport() {
            document.getElementById('exportBtn').addEventListener('click',()=>{const json=JSON.stringify({tasks:this.tasks,notes:this.notes,studySessions:this.studySessions,flashcards:this.flashcards,vocab:this.vocab,grades:this.grades,archived:this.archived,books:this.books,readingLogs:this.readingLogs,exportDate:new Date().toISOString()},null,2);const b=new Blob([json],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`sand-dollar-${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(u);});
            document.getElementById('logoutBtn').addEventListener('click',()=>{document.body.classList.add('app-locked');const ls=document.getElementById('lockScreen');ls.style.display='';ls.classList.remove('unlocked');document.getElementById('lockInput').value='';document.getElementById('lockError').textContent='';document.getElementById('lockInput').focus();});
        },
        setupSearch() {
            const input=document.getElementById('searchInput'), results=document.getElementById('searchResults');
            input.addEventListener('input',()=>{
                const q=input.value.toLowerCase().trim();
                if(q.length<2){results.classList.remove('active');return;}
                let hits=[];
                this.tasks.forEach(t=>{if(t.title.toLowerCase().includes(q))hits.push({type:'Task',title:t.title,page:'tasks'});});
                this.assignments.forEach(a=>{if(a.title.toLowerCase().includes(q)||a.class.toLowerCase().includes(q))hits.push({type:'Assignment',title:`${a.title} (${a.class})`,page:'assignments'});});
                this.notes.forEach(n=>{if(n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q))hits.push({type:'Note',title:n.title,page:'notes'});});
                this.vocab.forEach(v=>{if(v.word.toLowerCase().includes(q)||v.definition.toLowerCase().includes(q))hits.push({type:'Vocab',title:v.word,page:'vocab'});});
                this.flashcards.forEach(f=>{if(f.name.toLowerCase().includes(q))hits.push({type:'Deck',title:f.name,page:'flashcards'});});
                this.grades.forEach(g=>{if(g.name.toLowerCase().includes(q)||g.gradeClass.toLowerCase().includes(q))hits.push({type:'Grade',title:`${g.name} (${g.score}%)`,page:'grades'});});
                this.books.forEach(b=>{if(b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||(b.genre||'').toLowerCase().includes(q))hits.push({type:'Book',title:`${b.title} by ${b.author}`,page:'reading'});});
                if(hits.length===0){results.innerHTML=`<div style="padding:16px;color:var(--text-tertiary);text-align:center;font-size:13px;">No results found</div>`;results.classList.add('active');return;}
                results.innerHTML=hits.slice(0,8).map(h=>`<div class="search-result-item" data-goto="${h.page}"><div class="search-result-type">${h.type}</div><div class="search-result-title">${h.title}</div></div>`).join('');
                results.classList.add('active');
                results.querySelectorAll('[data-goto]').forEach(el=>{el.addEventListener('click',()=>{this.currentPage=el.dataset.goto;document.querySelectorAll('[data-page]').forEach(i=>i.classList.remove('active'));document.querySelector(`[data-page="${el.dataset.goto}"]`).classList.add('active');this.render();results.classList.remove('active');input.value='';});});
            });
            document.addEventListener('click',(e)=>{if(!e.target.closest('.search-box'))results.classList.remove('active');});
        },

        render() {
            const c=document.getElementById('content'),t=document.getElementById('pageTitle');
            let html='',title='';
            if(this.currentPage==='dashboard'){html=this.renderDashboard();title='Dashboard';}
            else if(this.currentPage==='calendar'){html=this.renderCalendar();title='Calendar';}
            else if(this.currentPage==='tasks'){html=this.renderTasks();title='Tasks';}
            else if(this.currentPage==='assignments'){html=this.renderAssignments();title='Assignments';}
            else if(this.currentPage==='notes'){html=this.renderNotes();title='Notes & Reminders';}
            else if(this.currentPage==='study'){html=this.renderStudy();title='Study Time';}
            else if(this.currentPage==='flashcards'){html=this.renderFlashcards();title='Flashcards';}
            else if(this.currentPage==='vocab'){html=this.renderVocab();title='Vocabulary';}
            else if(this.currentPage==='grades'){html=this.renderGrades();title='Grades';}
            else if(this.currentPage==='reading'){html=this.renderReading();title='Reading';}
            else if(this.currentPage==='archive'){html=this.renderArchive();title='Archive';}
            t.textContent=title;c.innerHTML=html;this.attachListeners();
        },

        attachListeners() {
            document.querySelectorAll('[data-fctab]').forEach(b=>{b.addEventListener('click',()=>{this.activeFlashcardTab=b.dataset.fctab;this.render();});});
            document.querySelectorAll('[data-vocabtab]').forEach(b=>{b.addEventListener('click',()=>{this.activeVocabTab=b.dataset.vocabtab;this.render();});});
            document.querySelectorAll('[data-classtab]').forEach(b=>{b.addEventListener('click',()=>{this.activeClassTab=b.dataset.classtab;this.render();});});
            document.querySelectorAll('[data-delete]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.deleteItem(b.dataset.type,parseInt(b.dataset.id));});});
            document.querySelectorAll('[data-toggle]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.toggleItem(b.dataset.type,parseInt(b.dataset.id));});});
            document.querySelectorAll('[data-study-deck]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.startStudyMode(parseInt(b.dataset.studyDeck));});});
            document.querySelectorAll('[data-addcard-deck]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.showAddCardForm(parseInt(b.dataset.addcardDeck));});});
            document.querySelectorAll('[data-sort]').forEach(b=>{b.addEventListener('click',()=>{this.assignmentSort=b.dataset.sort;this.render();});});
            document.querySelectorAll('[data-archive]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.archiveItem(parseInt(b.dataset.archive));});});
            document.querySelectorAll('[data-unarchive]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.unarchiveItem(parseInt(b.dataset.unarchive));});});
            document.querySelectorAll('[data-pin]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.togglePin(parseInt(b.dataset.pin));});});
            document.querySelectorAll('[data-topfive]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.toggleTopFive(parseInt(b.dataset.topfive));});});
            document.querySelectorAll('[data-logread]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();this.logReading(parseInt(b.dataset.logread));});});
            // Reading log submit
            const rlForm=document.getElementById('readingLogForm');
            if(rlForm){rlForm.addEventListener('submit',(e)=>{e.preventDefault();const f=new FormData(rlForm);const bookId=parseInt(f.get('bookId'));const words=parseInt(f.get('words'));const note=f.get('note')||'';if(words>0)this.submitReadingLog(bookId,words,note);});}
            // Page calculator
            const pageCalcBtn=document.getElementById('pageCalcBtn');
            if(pageCalcBtn){pageCalcBtn.addEventListener('click',()=>{const pages=parseInt(document.getElementById('pageCalcPages').value);const wpp=parseInt(document.getElementById('pageCalcWpp').value);if(pages>0&&wpp>0){const wordsInput=document.getElementById('readingWordsInput');if(wordsInput)wordsInput.value=pages*wpp;}});}
            // Cancel log
            const cancelLogBtn=document.getElementById('cancelLogBtn');
            if(cancelLogBtn){cancelLogBtn.addEventListener('click',()=>{this.logBookTarget=null;this.render();});}
            // Quick log (manual, no book)
            const qlForm=document.getElementById('quickLogForm');
            if(qlForm){qlForm.addEventListener('submit',(e)=>{e.preventDefault();const f=new FormData(qlForm);const w=parseInt(f.get('words'));if(w>0)this.submitQuickLog(w,f.get('note'));});}
            // Page number updates
            document.querySelectorAll('[data-updatepage]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();const bookId=parseInt(b.dataset.updatepage);const input=document.getElementById('pageInput_'+bookId);if(input&&parseInt(input.value)>0)this.updateBookPage(bookId,parseInt(input.value));});});
            // Word count lookup on add book form
            const lookupBtn=document.getElementById('lookupWordCountBtn');
            if(lookupBtn){lookupBtn.addEventListener('click',()=>{const titleInput=document.querySelector('#bookForm input[name="title"]');const wcInput=document.getElementById('bookTotalWordsInput');if(titleInput&&wcInput){const wc=this.lookupWordCount(titleInput.value);if(wc){wcInput.value=wc;wcInput.style.borderColor='#10b981';}else{wcInput.placeholder='Not found — enter manually';wcInput.style.borderColor='#d97706';}}});}
            document.querySelectorAll('[data-finishbook]').forEach(b=>{b.addEventListener('click',(e)=>{e.stopPropagation();const bk=this.books.find(x=>x.id===parseInt(b.dataset.finishbook));if(bk){bk.status='finished';bk.finishedDate=new Date();this.saveData();this.render();}});});
            const goalInput = document.getElementById('studyGoalInput');
            if(goalInput){goalInput.addEventListener('change',()=>{this.weeklyStudyGoal=parseInt(goalInput.value)||120;this.saveData();this.render();});}
        },

        archiveItem(id) {
            const a=this.assignments.find(x=>x.id===id);
            if(a){this.archived.push({...a,archivedDate:new Date()});this.assignments=this.assignments.filter(x=>x.id!==id);this.saveData();this.render();
            // Check if all assignments are done
            if(this.assignments.length>0&&this.assignments.every(x=>x.completed)){fishRain();}}
        },
        unarchiveItem(id) { const a=this.archived.find(x=>x.id===id);if(a){this.assignments.push(a);this.archived=this.archived.filter(x=>x.id!==id);this.saveData();this.render();} },
        togglePin(id) { const n=this.notes.find(x=>x.id===id);if(n){n.pinned=!n.pinned;this.saveData();this.render();} },
        toggleTopFive(id) { const b=this.books.find(x=>x.id===id);if(b){b.topFive=!b.topFive;this.saveData();this.render();} },
        logReading(bookId) {
            const bk=this.books.find(x=>x.id===bookId);if(!bk)return;
            // Show inline form instead of prompt - handled by render
            this.logBookTarget=bookId;this.render();
        },
        submitReadingLog(bookId,words,note) {
            const bk=this.books.find(x=>x.id===bookId);if(!bk)return;
            this.readingLogs.push({id:Date.now(),bookId,words:parseInt(words),note:note||'',date:new Date()});
            bk.totalWords=(bk.totalWords||0)+parseInt(words);
            this.logBookTarget=null;this.saveData();this.render();
        },
        submitQuickLog(words,note) {
            this.readingLogs.push({id:Date.now(),bookId:null,words:parseInt(words),note:note||'General reading',date:new Date()});
            this.saveData();this.render();
        },
        updateBookPage(bookId,pageNum) {
            const bk=this.books.find(x=>x.id===bookId);if(!bk)return;
            bk.currentPageNum=parseInt(pageNum);
            const wpp=this.getWordsPerPage(bk.genre);
            bk.estimatedWordsRead=bk.currentPageNum*wpp;
            this.saveData();this.render();
        },
        getTodayWords() {
            const todayStr=new Date().toDateString();
            return this.readingLogs.filter(l=>new Date(l.date).toDateString()===todayStr).reduce((s,l)=>s+l.words,0);
        },
        getTodayLogs() {
            const todayStr=new Date().toDateString();
            return this.readingLogs.filter(l=>new Date(l.date).toDateString()===todayStr);
        },
        getReadingStats() {
            const now=new Date(),logs=this.readingLogs;
            if(logs.length===0)return{totalWords:0,avgDay:0,avgWeek:0,avgMonth:0,avgYear:0,daysTracked:0,dailyData:[]};
            const totalWords=logs.reduce((s,l)=>s+l.words,0);
            const firstLog=new Date(Math.min(...logs.map(l=>new Date(l.date))));
            const daysSinceFirst=Math.max(1,Math.ceil((now-firstLog)/(1000*60*60*24)));
            const avgDay=Math.round(totalWords/daysSinceFirst);
            // Words in last 7 days
            const w7=new Date(now);w7.setDate(w7.getDate()-7);
            const last7=logs.filter(l=>new Date(l.date)>=w7).reduce((s,l)=>s+l.words,0);
            const avgWeek=Math.round(last7/7);
            // Words in last 30 days

            for(let i=13;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toDateString();const dayWords=logs.filter(l=>new Date(l.date).toDateString()===ds).reduce((s,l)=>s+l.words,0);dailyData.push({date:d,words:dayWords,label:d.toLocaleDateString('en-US',{month:'short',day:'numeric'})});}

        getWeekStudyMinutes() {

        },

                    <div class="card" style="text-align:center;border-top:3px solid #2563eb;">${completionRing(dA,tA||1,72,'#2563eb')}<div style="color:var(--text-secondary);font-size:13px;margin-top:8px;">Assignments</div><div style="font-size:11px;color:var(--text-tertiary);">${dA} of ${tA} done</div></div>
                    <div class="card" style="text-align:center;border-top:3px solid #0d9488;">${completionRing(dT,tT||1,72,'#0d9488')}<div style="color:var(--text-secondary);font-size:13px;margin-top:8px;">Tasks</div><div style="font-size:11px;color:var(--text-tertiary);">${dT} of ${tT} done</div></div>
                    <div class="card" style="text-align:center;border-top:3px solid #047857;"><div style="font-size:32px;font-weight:800;color:#047857;">${sT}</div><div style="color:var(--text-secondary);font-size:13px;margin-top:4px;">Study Minutes</div></div>
                    <div class="card" style="text-align:center;border-top:3px solid #fb923c;"><div style="font-size:32px;font-weight:800;color:#fb923c;">${nN}</div><div style="color:var(--text-secondary);font-size:13px;margin-top:4px;">Don't Forgets</div></div>

                    <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${goalPct}%;${goalPct>=100?'background:linear-gradient(90deg,#10b981,#059669);':''}"></div></div>
                    <div style="font-size:12px;color:var(--text-tertiary);margin-top:6px;">${goalPct>=100?'🎉 Goal reached this week!':Math.round(this.weeklyStudyGoal-weekMin)+' min to go'}</div>
                </div>
                ${this.notes.filter(n=>n.pinned).length>0?`<div style="margin-bottom:24px;"><div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:14px;">📌 Pinned Notes</div>${this.notes.filter(n=>n.pinned).map(n=>`<div class="card" style="margin-bottom:10px;border-left:4px solid #f97316;padding:14px 16px;"><div style="font-weight:700;font-size:14px;">${n.title}</div><div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">${n.content}</div></div>`).join('')}</div>`:''}
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
                    <div><div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:14px;">🪸 Due Soon</div>${upcoming.length===0?`<div class="card" style="text-align:center;color:var(--text-secondary);font-size:13px;">Nothing due in the next 7 days 🎉</div>`:upcoming.map(a=>{const co=CC[a.class]||'#047857';return`<div class="card" style="margin-bottom:10px;border-left:4px solid ${co};padding:14px 16px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div style="font-weight:700;font-size:14px;">${a.title}</div>${countdownBadge(a.dueDate)}</div><div style="display:flex;gap:8px;margin-top:6px;"><span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(${hexToRgb(co)},0.18);color:${co};font-weight:700;">${a.class}</span></div></div>`;}).join('')}</div>
                    <div><div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:14px;">📅 Today's Schedule</div>${todayEvents.length===0?`<div class="card" style="text-align:center;color:var(--text-secondary);font-size:13px;">No events today</div>`:todayEvents.map(e=>`<div class="card" style="margin-bottom:10px;border-left:4px solid #0369a1;padding:14px 16px;"><div style="font-weight:700;font-size:14px;">${e.title}</div>${e.time?`<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">🕐 ${e.time}</div>`:''}${e.note?`<div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">${e.note}</div>`:''}</div>`).join('')}

        renderCalendar() {
            const today=new Date(),year=today.getFullYear(),month=today.getMonth(),firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0),daysInMonth=lastDay.getDate(),startDow=firstDay.getDay();

            this.calendarEvents.forEach(e=>{if(!e.date)return;const d=new Date(e.date+'T12:00:00');if(d.getFullYear()===year&&d.getMonth()===month){const dy=d.getDate();if(!eByDay[dy])eByDay[dy]=[];eByDay[dy].push(e);}});

            html+=`</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;padding:10px 12px;background:var(--glass-bg);border-radius:10px;border:1px solid var(--glass-border);">${Object.entries(CC).map(([c,co])=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary);"><div style="width:8px;height:8px;border-radius:50%;background:${co};"></div>${c}</div>`).join('')}<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary);"><div style="width:8px;height:8px;border-radius:50%;background:#f97316;"></div>Event</div></div></div>`;
            html+=`<div><div class="form-section" style="margin-top:0;"><h3 style="margin-bottom:16px;color:var(--text-primary);">➕ Add Event</h3><form id="calEventForm" style="display:flex;flex-direction:column;gap:12px;"><div class="form-group"><label class="form-label">Title</label><input type="text" class="form-input" name="title" placeholder="e.g. Doctor appointment" required></div><div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" name="date" required></div><div class="form-group"><label class="form-label">Time (optional)</label><input type="time" class="form-input" name="time"></div><div class="form-group"><label class="form-label">Note (optional)</label><input type="text" class="form-input" name="note" placeholder="Details..."></div><button type="submit" class="btn btn-primary">Add to Calendar</button></form></div>`;
            if(this.calendarEvents.length>0){html+=`<div style="margin-top:20px;"><div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:10px;text-transform:uppercase;">Upcoming Events</div>${this.calendarEvents.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>`<div class="card" style="margin-bottom:10px;border-left:4px solid #f97316;padding:12px 14px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div><div style="font-weight:700;font-size:13px;">${e.title}</div><div style="font-size:12px;color:var(--text-secondary);margin-top:3px;">📅 ${new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}${e.time?' 🕐 '+e.time:''}</div>${e.note?`<div style="font-size:11px;color:var(--text-tertiary);margin-top:2px;">${e.note}</div>`:''}</div><button class="btn-delete" data-delete data-type="calendarEvents" data-id="${e.id}">✕</button></div></div>`).join('')}</div>`;}

        renderReading() {
            const stats=this.getReadingStats();const topFive=this.books.filter(b=>b.topFive).slice(0,5);
            const reading=this.books.filter(b=>b.status==='reading');const finished=this.books.filter(b=>b.status==='finished');const wantToRead=this.books.filter(b=>b.status==='want');
            const GC={'Fiction':'#0d9488','Non-Fiction':'#2563eb','Sci-Fi':'#0369a1','Fantasy':'#7c3aed','Mystery':'#0891b2','Horror':'#991b1b','Romance':'#db2777','Biography':'#d97706','History':'#c2410c','Poetry':'#14b8a6','Science':'#06b6d4','Self-Help':'#059669','Other':'#7a8fa0'};
            const genreCounts={};this.books.forEach(b=>{if(b.genre){genreCounts[b.genre]=(genreCounts[b.genre]||0)+1;}});
            const topGenres=Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);
            const suggestions={'Fiction':['The Great Gatsby','To Kill a Mockingbird','1984','The Catcher in the Rye','Beloved'],'Non-Fiction':['Sapiens','Educated','Outliers','The Immortal Life of Henrietta Lacks','Thinking Fast and Slow'],'Sci-Fi':['Dune','Ender\'s Game','The Left Hand of Darkness','Neuromancer','The Hitchhiker\'s Guide'],'Fantasy':['The Name of the Wind','Mistborn','The Hobbit','A Wizard of Earthsea','Percy Jackson'],'Mystery':['And Then There Were None','Gone Girl','The Girl with the Dragon Tattoo','Big Little Lies','In the Woods'],'Horror':['The Shining','Mexican Gothic','House of Leaves','The Haunting of Hill House','Bird Box'],'Romance':['Pride and Prejudice','The Notebook','Beach Read','Red White & Royal Blue','The Hating Game'],'Biography':['Steve Jobs','Becoming','The Diary of a Young Girl','Long Walk to Freedom','Born a Crime'],'History':['A People\'s History','The Wright Brothers','Unbroken','Guns Germs and Steel','The Devil in the White City'],'Poetry':['Milk and Honey','The Sun and Her Flowers','Leaves of Grass','Where the Sidewalk Ends','The Waste Land'],'Science':['A Short History of Nearly Everything','The Elegant Universe','Cosmos','Silent Spring','The Gene'],'Self-Help':['Atomic Habits','The 7 Habits','How to Win Friends','Mindset','The Subtle Art'],'Other':['The Alchemist','Tuesdays with Morrie','Man\'s Search for Meaning','The Little Prince','Siddhartha']};
            const readTitles=this.books.map(b=>b.title.toLowerCase());let recs=[];topGenres.forEach(g=>{if(suggestions[g])suggestions[g].forEach(s=>{if(!readTitles.includes(s.toLowerCase())&&recs.length<5)recs.push({title:s,genre:g});});});
            if(recs.length<3)Object.entries(suggestions).forEach(([g,t])=>{t.forEach(s=>{if(!readTitles.includes(s.toLowerCase())&&recs.length<5&&!recs.find(r=>r.title===s))recs.push({title:s,genre:g});});});
            const todayWords=this.getTodayWords();const todayLogs=this.getTodayLogs();
            let html=`<div style="max-width:960px;">`;
            // TODAY'S READING
            html+=`<div class="card" style="margin-bottom:20px;border-left:4px solid #10b981;background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(4,120,87,0.04));"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;"><div><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#10b981;letter-spacing:0.08em;margin-bottom:4px;">Today's Reading</div><div style="font-size:28px;font-weight:800;color:#10b981;">${todayWords.toLocaleString()} <span style="font-size:14px;font-weight:600;color:var(--text-secondary);">words</span></div></div><div style="display:flex;gap:16px;">${todayLogs.length>0?todayLogs.map(l=>{const bk=this.books.find(b=>b.id===l.bookId);return`<div style="text-align:center;"><div style="font-size:13px;font-weight:700;color:var(--text-primary);">${l.words.toLocaleString()}</div><div style="font-size:10px;color:var(--text-tertiary);">${bk?bk.title.substring(0,15):'General'}${l.note?' · '+l.note.substring(0,12):''}</div><div style="font-size:9px;color:var(--text-tertiary);">${new Date(l.date).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div></div>`;}).join(''):`<div style="font-size:12px;color:var(--text-tertiary);padding:8px;">No entries yet today</div>`}</div></div></div>`;
            // STATS

n page:</label><div style="display:flex;gap:6px;"><input type="number" id="pageInput_${b.id}" class="form-input" style="width:80px;padding:6px 8px;font-size:13px;" value="${b.currentPageNum||''}" placeholder="pg#" min="1"><button class="btn btn-secondary btn-sm" data-updatepage="${b.id}">Update</button></div></div></div><div class="card-footer" style="margin-top:10px;"><div style="display:flex;gap:6px;"><button class="btn btn-primary btn-sm" data-logread="${b.id}">📝 Log</button><button class="btn btn-secondary btn-sm" data-finishbook="${b.id}">✅ Done</button></div><button class="btn-delete" data-delete data-type="books" data-id="${b.id}">✕</button></div></div>`;}).join('')}</div></div>`;

    // Form submissions
    document.addEventListener('submit',(e)=>{
        e.preventDefault();const f=new FormData(e.target);
        if(e.target.id==='taskForm'){app.tasks.push({id:Date.now(),title:f.get('title'),description:f.get('description'),priority:f.get('priority'),dueDate:f.get('dueDate'),completed:false});}
        else if(e.target.id==='assignmentForm'){app.assignments.push({id:Date.now(),title:f.get('title'),description:f.get('description'),class:f.get('class'),priority:f.get('priority'),dueDate:f.get('dueDate'),completed:false});}
        else if(e.target.id==='noteForm'){app.notes.push({id:Date.now(),title:f.get('title'),content:f.get('content'),noteClass:f.get('noteClass')||'',category:f.get('category')||'',date:new Date(),pinned:false});}
        else if(e.target.id==='studyForm'){app.studySessions.push({id:Date.now(),subject:f.get('subject'),minutes:parseInt(f.get('minutes')),date:new Date()});app.saveData();app.render();alert('Great job studying! 🎓');return;}
        else if(e.target.id==='deckForm'){app.flashcards.push({id:Date.now(),name:f.get('name'),fcClass:f.get('fcClass')||'',cards:[]});}
        else if(e.target.id==='calEventForm'){app.calendarEvents.push({id:Date.now(),title:f.get('title'),date:f.get('date'),time:f.get('time')||'',note:f.get('note')||''});}
        else if(e.target.id==='vocabForm'){app.vocab.push({id:Date.now(),word:f.get('word'),definition:f.get('definition'),example:f.get('example')||'',vocabClass:f.get('vocabClass')||''});}
        else if(e.target.id==='gradeForm'){app.grades.push({id:Date.now(),name:f.get('name'),gradeClass:f.get('gradeClass'),score:parseInt(f.get('score')),date:new Date()});}
        else if(e.target.id==='bookForm'){const btw=parseInt(f.get('bookTotalWords'))||0;const btp=parseInt(f.get('bookTotalPages'))||0;app.books.push({id:Date.now(),title:f.get('title'),author:f.get('author'),genre:f.get('genre')||'',status:f.get('status'),totalWords:0,bookTotalWords:btw,bookTotalPages:btp,currentPageNum:0,topFive:false,addedDate:new Date()});}
        app.saveData();app.render();

    // Lock screen
    const lockScreen={
        getPassword(){return localStorage.getItem('sandDollarPassword')||'ocean';},
        setPassword(p){localStorage.setItem('sandDollarPassword',p);},
        isSetupDone(){return localStorage.getItem('sandDollarPassword')!==null;},
        unlock(){const input=document.getElementById('lockInput'),error=document.getElementById('lockError');if(input.value===this.getPassword()){document.getElementById('lockScreen').classList.add('unlocked');setTimeout(()=>{document.body.classList.remove('app-locked');document.getElementById('lockScreen').style.display='none';initStarfield();app.init();},600);}else{error.textContent='Wrong password — try again';error.classList.remove('shake');void error.offsetWidth;error.classList.add('shake');input.value='';input.focus();}},
        showChangePassword(){const s=document.getElementById('lockSettings');s.innerHTML=`<div style="margin-top:16px;background:rgba(13,31,45,0.8);padding:20px;border-radius:12px;border:1px solid var(--border);width:280px;margin:16px auto 0;"><div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:12px;">Change Password</div><input type="password" class="lock-input" id="oldPassInput" placeholder="Current" style="margin-bottom:10px;letter-spacing:2px;font-size:14px;padding:12px 16px;"><input type="password" class="lock-input" id="newPassInput" placeholder="New" style="margin-bottom:10px;letter-spacing:2px;font-size:14px;padding:12px 16px;"><input type="password" class="lock-input" id="confirmPassInput" placeholder="Confirm" style="margin-bottom:14px;letter-spacing:2px;font-size:14px;padding:12px 16px;"><div style="display:flex;gap:8px;justify-content:center;"><button class="lock-btn" id="savePassBtn" style="padding:10px 24px;font-size:13px;">Save</button><button class="lock-btn" id="cancelPassBtn" style="padding:10px 24px;font-size:13px;background:var(--surface-light);box-shadow:none;">Cancel</button></div><div id="passChangeError" style="color:#fca5a5;font-size:12px;margin-top:10px;"></div></div>`;
        document.getElementById('savePassBtn').addEventListener('click',()=>{const o=document.getElementById('oldPassInput').value,n=document.getElementById('newPassInput').value,c=document.getElementById('confirmPassInput').value,err=document.getElementById('passChangeError');if(o!==this.getPassword()){err.textContent='Wrong current password';return;}if(!n){err.textContent='Cannot be empty';return;}if(n!==c){err.textContent="Don't match";return;}this.setPassword(n);s.innerHTML=`<div style="color:#10b981;margin-top:12px;">✅ Updated!</div>`;setTimeout(()=>{s.innerHTML=`<a id="changePassLink">Change password</a>`;this.attachLink();},2000);});
        document.getElementById('cancelPassBtn').addEventListener('click',()=>{s.innerHTML=`<a id="changePassLink">Change password</a>`;this.attachLink();});},
        attachLink(){const l=document.getElementById('changePassLink');if(l)l.addEventListener('click',()=>this.showChangePassword());},
        init(){const s=document.getElementById('lockSettings');if(!this.isSetupDone()){s.innerHTML=`<div style="color:var(--text-secondary);font-size:12px;">Default password: <strong style="color:var(--text-primary);">ocean</strong></div>`;}else{s.innerHTML=`<a id="changePassLink">Change password</a>`;this.attachLink();}document.getElementById('lockInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')this.unlock();});document.getElementById('lockBtn').addEventListener('click',()=>this.unlock());document.getElementById('lockInput').focus();}
    };
    lockScreen.init();
    </script>
</body>
